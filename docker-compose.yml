services:
  agentflow:
    build: .
    container_name: researchagent
    ports:
      - "7860:7860"
    env_file:
      - .env
    volumes:
      # 持久化记忆数据
      - ./memory_data:/app/.researchagent/memory
      # 挂载 HuggingFace 模型缓存 (避免重复下载 BGE-M3)
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 30s
      timeout: 10s
      retries: 3
